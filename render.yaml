databases:
  - name: daweb-db
    databaseName: daweb_db
    user: daweb_user
    plan: free

services:
  # ── BACKEND: Spring Boot (Docker) ──────────────────────────────────────────
  - type: web
    name: daweb-backend
    runtime: docker
    rootDir: daweb_ies
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /alumno
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: daweb-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: daweb-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: daweb-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: daweb-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: daweb-db
          property: password

  # ── FRONTEND: Angular SSR (Node) ───────────────────────────────────────────
  - type: web
    name: daweb-frontend
    runtime: node
    rootDir: FrontendConsumirAPI
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/FrontendConsumirAPI/server/server.mjs
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
